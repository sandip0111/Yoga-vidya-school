<section class="fee" *ngIf="list.length > 0">
  <div>
    <img
      loading="lazy"
      alt="Not Loaded"
      [src]="s3Bucket.flower"
      class="flower-img"
    />
  </div>
  <h2>What’s <span>Covered in The Course</span></h2>
  <h2>We provide the best {{ feesData?.title }} at affordable price.</h2>
  <div class="row">
    <div class="col-md-12">
      <div class="borderall mb-2" *ngFor="let item of list; let i = index">
        <div class="row align-items-center">
          <div class="col-md-1 col-3">
            <div class="icon">
              <img
                loading="lazy"
                [src]="s3Bucket.whitecheck"
                class="img-fluid"
                alt="About Image"
              />
            </div>
          </div>
          <div class="col-md-11 col-9 text-left">
            <h3>{{ item.title }}</h3>
            <p *ngIf="item.text" class="p0">{{ item.text }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <app-start-class [data]="feesData"></app-start-class>
</section>
